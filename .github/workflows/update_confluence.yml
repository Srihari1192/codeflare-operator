name: Update Confluence Table

on:
  workflow_dispatch:  # Manually trigger the workflow with input values
    inputs:
      new_release:
        description: 'New Release Version'
        required: true
      kueue_version:
        description: 'Kueue Version'
        required: true
      codeflare_version:
        description: 'CodeFlare Version'
        required: true

jobs:
  update-confluence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Current Page Content
        run: |
          echo "Fetching Confluence Page..."
          response=$(curl  -H "Authorization: Bearer ${{ secrets.CONFLUENCE_API_TOKEN }}" \
            "${{ secrets.CONFLUENCE_BASE_URL }}/rest/api/content?title=${{ secrets.PAGE_TITLE }}&spaceKey=${{ secrets.SPACE_KEY }}&expand=body.storage,version")
          
          echo "Raw API Response:"
          echo "$response" | jq '.' > page_data.json
          
          PAGE_VERSION=$(jq '.results[0].version.number' page_data.json)
          echo "Extracted Version: $PAGE_VERSION"

          if [[ -z "$PAGE_VERSION" || "$PAGE_VERSION" == "null" ]]; then
            echo "Error: Could not retrieve current page version."
            exit 1
          fi
          echo "PAGE_VERSION=$PAGE_VERSION" >> $GITHUB_ENV

          echo "Extracting HTML content..."
          jq -r '.body.storage.value' page_data.json > page_content.html

      - name: Modify Table and Append New Row
        run: |
          NEW_RELEASE="${{ github.event.inputs.new_release }}"
          KUEUE_VERSION="${{ github.event.inputs.kueue_version }}"
          CODEFLARE_VERSION="${{ github.event.inputs.codeflare_version }}"

          echo "Appending new row with values: $NEW_RELEASE, $KUEUE_VERSION, $CODEFLARE_VERSION"
          sed -i '/<\/tbody>/i \
          <tr role="row"><td class="confluenceTd">'$NEW_RELEASE'</td><td class="confluenceTd">'$KUEUE_VERSION'</td><td class="confluenceTd">'$CODEFLARE_VERSION'</td></tr>' page_content.html

      - name: Update Confluence Page
        run: |
            UPDATED_CONTENT=$(cat page_content.html | jq -Rs .)
            NEW_VERSION=$(( PAGE_VERSION + 1 ))

            curl -X PUT "${{ secrets.CONFLUENCE_BASE_URL }}/rest/api/content/${{ secrets.CONFLUENCE_PAGE_ID }}" \
              -H "Authorization: Bearer ${{ secrets.CONFLUENCE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"id\": \"${{ secrets.CONFLUENCE_PAGE_ID }}\",
                \"type\": \"page\",
                \"title\": \"${{ secrets.PAGE_TITLE }}\",
                \"space\": { \"key\": \"${{ secrets.SPACE_KEY }}\" },
                \"body\": {
                \"storage\": {
                \"value\": $UPDATED_CONTENT,
                \"representation\": \"storage\"
                }
              },
              \"version\": {
                 \"number\": $NEW_VERSION
              }
            }"
